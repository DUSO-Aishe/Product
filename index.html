<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="CSS/Style.css">
  
  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <div id="all">
    <picture>
      <source media="(min-width: 1024px)" srcset="images/image-product-desktop.jpg">

      <img src="images/image-product-mobile.jpg">
    </picture>
    <div id="text">
    <h3>Perfume</h3>
    
    <div id="no-headline">
    <h1>Gabrielle Essence Eau De Parfum</h1>

    <p class="desc">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
    Perfumer-Creator for the House of CHANEL.</p>
    
    <div id="price">
    <p class="after">$149.99</p>
    <p class="before">$169.99</p>
    </div>
    <p class="button"><img src="images/icons8-cart-48.png" style="width:20px; height:20px;"> <span>Add to Cart</span></p>

    </div>
    </div>
  </div>

</body>
</html>
